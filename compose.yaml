services:
  kanban:
    image: lahmanja/kanban:latest
    container_name: kanban
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - lahmanja/kanban:latest
      # Build metadata. Resolve on the host since .git is dockerignored and
      # worktrees only stash a gitdir pointer. Set alongside your other env
      # vars when invoking `docker compose up --build`, e.g.:
      #   VERSION=$(git describe --tags --always --dirty) \
      #   docker compose up -d --build
      args:
        VERSION: ${VERSION:-dev}
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "13000-13099:13000-13099"
    environment:
      HOME: ${HOME}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      KANBAN_DATA_DIR: ${HOME}/.local/share/kanban
      GH_TOKEN: ${GH_TOKEN:-}
      DEVCONTAINER_REMOTE_USER: ${DEVCONTAINER_REMOTE_USER:-}
      SSH_AUTH_SOCK: ${SSH_AUTH_SOCK:-}
    volumes:
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock
      # Agent config dir. Claude Code reads ~/.claude; for other
      # harnesses (e.g. pi/Ollama) substitute or add the relevant path.
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/code:${HOME}/code
      - ${HOME}/.local/share/kanban:${HOME}/.local/share/kanban
      - ${HOME}/.config/kanban:${HOME}/.config/kanban:ro
    networks:
      - kanban-net

networks:
  kanban-net:
    name: kanban-net
